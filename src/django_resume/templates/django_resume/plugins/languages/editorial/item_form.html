<editable-form id="{{ plugin_name }}-item-{{ form.item_id }}" class="language-box stack stack-card">
  {#  This is a hidden form that will be submitted by the button below.#}
  <form
    id="{{ plugin_name }}-form-{{ form.item_id }}"
    class="stack-small"
    hx-post="{{ form.post_url }}"
    hx-target="#{{ plugin_name }}-item-{{ form.item_id }}"
    hx-swap="outerHTML"
  >
    <input data-field="id" type="hidden" name="id" value="{{ form.item_id }}">
    <input data-field="position" type="hidden" name="position" value="{{ form.position.value }}">
    <input type="hidden" data-field="name" name="name" value="{{ form.name.value }}">
    <input type="hidden" data-field="level" name="level" value="{{ form.level.value }}">
    <input type="hidden" data-field="note" name="note" value="{{ form.note.value }}">
  </form>
  <div>
    <h3 contenteditable="true" data-field="name">{{ form.name.value }}</h3>
  </div>
  <label class="cluster">
    <span>Level (0–100)</span>
    <span contenteditable="true" data-field="level">{{ form.level.value }}</span>
  </label>
  <label class="cluster">
    <span>Note</span>
    <span contenteditable="true" data-field="note">{{ form.note.value }}</span>
  </label>
  <div>
    {% for error in form.name.errors %}
      <p class="error">{{ error|escape }}</p>
    {% endfor %}
    {% for error in form.level.errors %}
      <p class="error">{{ error|escape }}</p>
    {% endfor %}
  </div>
  <button id="{{ plugin_name }}-submit-item-{{ form.item_id }}" type="submit">
    <svg class="edit-icon-small">
      <use href="#ok"></use>
    </svg>
  </button>
</editable-form>
